sentence=Arduino library for the INA228 High-Precision Digital Power/Current/Voltage Monitor
paragraph=Provides full access to the Texas Instruments INA228 20-bit delta-sigma ADC
power monitor via I2C. Supports bus voltage, shunt voltage, current, power,
temperature, energy (J/mWh), and charge (C/mAh) measurement with hardware
accumulation, shunt temperature compensation, dual ADC range
(±163.84mV / ±40.96mV), configurable averaging and conversion times,
and complete threshold alert functionality.
